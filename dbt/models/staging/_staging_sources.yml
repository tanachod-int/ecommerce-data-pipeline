version: 2

sources:
  - name: raw
    description: "Raw data ingested from DummyJSON API + Faker"
    schema: raw
    tables:
      - name: products
        description: "Product catalog (~194 rows from API)"
        columns:
          - name: id
            description: "Product ID (primary key)"
            tests:
              - unique
              - not_null
          - name: title
            tests:
              - not_null
          - name: price
            tests:
              - not_null
          - name: category
            tests:
              - not_null

      - name: users
        description: "Customer profiles (~208 rows from API)"
        columns:
          - name: id
            description: "User ID (primary key)"
            tests:
              - unique
              - not_null
          - name: email
            tests:
              - unique
              - not_null
          - name: first_name
            tests:
              - not_null
          - name: last_name
            tests:
              - not_null

      - name: orders
        description: "Order line items (~2,000+ rows, API carts + Faker)"
        columns:
          - name: id
            description: "Auto-increment line item ID"
            tests:
              - unique
              - not_null
          - name: cart_id
            tests:
              - not_null
          - name: user_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: quantity
            tests:
              - not_null
          - name: total
            tests:
              - not_null
